name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (TS — lint · typecheck · test · build)
    runs-on: ubuntu-latest
    # Postgres + Redis jetables : les e2e tournent sur une base dédiée (créée/migrée/seedée par le
    # globalSetup jest) — mêmes identifiants que le docker-compose local, zéro config spécifique.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hybrid
          POSTGRES_PASSWORD: hybrid
          POSTGRES_DB: hybrid_index_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U hybrid" --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Client Prisma : génération EXPLICITE (le postinstall auto de @prisma/client ne se
      # déclenche plus depuis que `prisma` est une dépendance de prod — migrate-au-boot).
      - run: pnpm --dir apps/api exec prisma generate
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      # Bloquant : la justesse du HYBRID INDEX est non négociable (CLAUDE.md règle 4).
      # Les flags jest ne vont QU'À l'api (turbo les passait aussi à vitest/contracts → crash).
      - run: npx turbo run test --filter=!@hybrid-index/api
      # Reporter github-actions : chaque test api en échec devient une ANNOTATION publique.
      # maxWorkers borné : 45 suites e2e (2 apps Nest chacune) sur 4 vCPU → timeouts sinon.
      - run: |
          set -o pipefail
          pnpm --dir apps/api test -- --maxWorkers=2 --reporters=default --reporters=github-actions 2>&1 | tee api-test.log

      # Diagnostic : le log remonte en ANNOTATIONS publiques quoi qu'il arrive (les filtres
      # « intelligents » ratent des cas — pnpm crie en MAJUSCULES, jest met des couleurs ANSI).
      - name: Diagnostic (annotations si échec)
        if: failure()
        run: |
          if [ -f api-test.log ]; then
            sed -e 's/\[[0-9;]*m//g' api-test.log | grep -iE "✕|✗|●|FAIL|Timeout|error" | head -25 | while IFS= read -r l; do echo "::error::API-TEST: $l"; done
            sed -e 's/\[[0-9;]*m//g' api-test.log | tail -15 | while IFS= read -r l; do echo "::error::API-TAIL: $l"; done
          else
            echo "::error::API-TEST: api-test.log ABSENT (echec avant jest)"
          fi

  mobile:
    name: Mobile (Flutter — analyze · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          # Même version que build-apk.yml et que le poste local : un stable flottant a déjà
          # cassé `flutter analyze` avec des lints plus récents. Monter les deux ENSEMBLE.
          flutter-version: "3.44.2"
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
