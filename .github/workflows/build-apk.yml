name: Build Android APK

# Fabrique l'APK Android d'Athlete League dans le cloud (aucun outil à installer en local).
# Lancement : onglet "Actions" du dépôt GitHub → "Build Android APK" → "Run workflow".
# Résultat : l'APK est téléchargeable en bas de la page du run (section "Artifacts").
on:
  workflow_dispatch: # bouton manuel
  push:
    branches: [main]
    paths: # ne reconstruit sur push que si le code mobile change
      - "apps/mobile/**"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true

      - name: Dépendances
        run: flutter pub get

      - name: Décoder la clé de signature (si le secret est présent)
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
            echo "✓ Clé de release décodée (APK signé avec la clé stable → Google Sign-In OK)."
          else
            echo "⚠ Pas de secret ANDROID_KEYSTORE_BASE64 → signature debug (Google Sign-In KO)."
          fi

      - name: Build APK (release, signé avec la clé stable si dispo)
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: >
          flutter build apk --release
          --dart-define=API_BASE_URL=https://api-production-9a50.up.railway.app
          --dart-define=PUSH_ENABLED=true

      - name: Publier l'APK (téléchargeable dans les Artifacts du run)
        uses: actions/upload-artifact@v4
        with:
          name: athlete-league-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
