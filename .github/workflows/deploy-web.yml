name: Deploy Web (Netlify)

# Reconstruit l'app Flutter Web et la redéploie sur Netlify à chaque modif du code mobile.
# (Relance du 03/07 après déblocage des crédits Netlify.)
# Résultat : le site (hybrid-index.netlify.app) a toujours la dernière version — il suffit de
# rafraîchir la page pour mettre à jour (aucune installation).
# Prérequis : 2 secrets GitHub à ajouter (Settings → Secrets and variables → Actions) :
#   - NETLIFY_AUTH_TOKEN : Netlify → User settings → Applications → Personal access tokens
#   - NETLIFY_SITE_ID    : Netlify → ton site → Site configuration → Site ID
on:
  workflow_dispatch: # bouton manuel
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - ".github/workflows/deploy-web.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true

      - name: Dépendances
        run: flutter pub get

      - name: Build web (pointé sur l'API de prod)
        # --pwa-strategy=none : PAS de service worker. Le SW par defaut (offline-first) servait aux
        # utilisateurs une ANCIENNE version cachee du code apres chaque deploiement (bug vecu 04/07 :
        # les correctifs n'atteignaient jamais le navigateur). Sans SW, chaque visite charge la
        # derniere version (cache navigateur standard, respecte les en-tetes).
        run: flutter build web --release --pwa-strategy=none --dart-define=API_BASE_URL=https://api-production-9a50.up.railway.app

      - name: Déployer sur Netlify
        run: |
          set -o pipefail
          npm i -g netlify-cli 2>&1 | tail -2
          netlify deploy --dir=build/web --prod --no-build 2>&1 | tee netlify.log
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Diagnostic (annotations si échec)
        if: failure()
        run: |
          grep -iE "error|failed|not found|unauthorized" netlify.log | head -20 | while IFS= read -r l; do echo "::error::NETLIFY: $l"; done
