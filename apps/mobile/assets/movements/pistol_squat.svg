<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- floor -->
  <path d="M24 176 L176 176" stroke="#8A93A6" stroke-width="4"/>
  <g stroke="#2BD4F5" stroke-width="4">
    <!-- one-leg squat bottom: deep on one leg, other leg extended forward -->
    <circle cx="92" cy="78" r="11"/>
    <path d="M92 89 L88 126"/>
    <!-- support leg deeply bent, foot under hips -->
    <path d="M88 126 L106 138 L100 176"/>
    <!-- free leg extended straight forward -->
    <path d="M88 126 L150 132"/>
    <!-- arms forward for counterbalance -->
    <path d="M92 100 L130 96"/>
  </g>
</svg>
