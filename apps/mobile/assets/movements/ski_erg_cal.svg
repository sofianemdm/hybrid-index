<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- ski erg: top flywheel housing on a mast -->
  <g stroke="#8A93A6" stroke-width="4">
    <line x1="48" y1="20" x2="48" y2="176"/>
    <circle cx="48" cy="44" r="18"/>
    <!-- pull cords from top -->
    <line x1="42" y1="60" x2="92" y2="96"/>
    <line x1="54" y1="60" x2="116" y2="96"/>
  </g>
  <g stroke="#2BD4F5" stroke-width="4">
    <!-- athlete hinged, pulling handles down past hips -->
    <circle cx="120" cy="62" r="11"/>
    <path d="M120 73 L116 116"/>
    <!-- arms pulled down to handles -->
    <path d="M118 84 L94 96 M118 84 L116 96"/>
    <!-- slightly bent legs -->
    <path d="M116 116 L130 160 L130 176 M116 116 L100 156 L98 176"/>
  </g>
  <!-- handle bars -->
  <g stroke="#8A93A6" stroke-width="4">
    <line x1="86" y1="92" x2="98" y2="100"/>
    <line x1="110" y1="92" x2="122" y2="100"/>
  </g>
</svg>
