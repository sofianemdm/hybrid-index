  </g>
  <!-- jerk: standing, bar locked overhead, split stance -->
  <g stroke="#2BD4F5" stroke-width="4">
    <circle cx="132" cy="72" r="11"/>
    <path d="M132 83 L132 132"/>
    <!-- arms locked up -->
    <path d="M132 90 L116 52 M132 90 L148 52"/>
