<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- floor -->
  <path d="M16 184 L184 184" stroke="#8A93A6" stroke-width="4"/>

  <!-- ===== PHASE 1 (ghost) : EPAULE — bar racked on shoulders, elbows high, knees bent ===== -->
  <g stroke="#8A93A6" stroke-width="4" opacity="0.5">
    <!-- head -->
    <circle cx="58" cy="78" r="10"/>
    <!-- torso, slightly upright -->
    <path d="M58 88 L56 124"/>
    <!-- elbows high under the bar (front rack) -->
    <path d="M56 100 L36 92 L40 70 M56 100 L76 92 L72 70"/>
    <!-- bent legs (receiving) -->
    <path d="M56 124 L74 142 L74 184 M56 124 L38 142 L40 184"/>
    <!-- barbell across shoulders -->
    <line x1="30" y1="64" x2="86" y2="64"/>
    <circle cx="30" cy="64" r="13"/>
    <circle cx="86" cy="64" r="13"/>
  </g>

  <!-- ===== PHASE 2 (key) : JETE — bar locked overhead, arms straight, split stance ===== -->
  <g stroke="#2BD4F5" stroke-width="4">
    <!-- head -->
    <circle cx="138" cy="84" r="10"/>
    <!-- torso, tall -->
    <path d="M138 94 L138 132"/>
    <!-- straight arms locked overhead -->
    <path d="M138 100 L122 52 M138 100 L154 52"/>
    <!-- split-stance legs (jerk lockout) -->
    <path d="M138 132 L162 158 L162 184 M138 132 L114 158 L106 184"/>
    <!-- barbell locked overhead -->
    <line x1="110" y1="46" x2="166" y2="46"/>
    <circle cx="110" cy="46" r="13"/>
    <circle cx="166" cy="46" r="13"/>
  </g>
</svg>
