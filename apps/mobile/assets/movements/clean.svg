<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- floor -->
  <path d="M20 180 L180 180" stroke="#8A93A6" stroke-width="4"/>
  <!-- start: bar on floor (ghost) -->
  <g stroke="#8A93A6" stroke-width="4" opacity="0.5">
    <circle cx="50" cy="104" r="9"/>
    <path d="M55 110 L84 134 L84 180"/>
    <path d="M84 134 L58 158"/>
    <line x1="46" y1="156" x2="46" y2="160"/>
  </g>
  <!-- catch: front rack, partial squat, bar on shoulders -->
  <g stroke="#2BD4F5" stroke-width="4">
    <circle cx="134" cy="70" r="11"/>
    <path d="M134 81 L132 116"/>
    <!-- elbows high under bar -->
    <path d="M134 90 L112 78 L122 60 M134 90 L156 78 L146 60"/>
    <!-- partial squat legs -->
    <path d="M132 116 L150 130 L150 180 M132 116 L114 130 L118 180"/>
  </g>
  <!-- barbell at shoulders -->
  <g stroke="#8A93A6" stroke-width="4">
    <line x1="104" y1="58" x2="164" y2="58"/>
    <line x1="108" y1="50" x2="108" y2="66"/>
    <line x1="160" y1="50" x2="160" y2="66"/>
  </g>
  <!-- up arrow -->
  <path d="M178 150 L178 100 M171 112 L178 96 L185 112" stroke="#8A93A6" stroke-width="4"/>
</svg>
