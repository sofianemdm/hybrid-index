<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- wall -->
  <path d="M168 20 L168 180" stroke="#8A93A6" stroke-width="4"/>
  <!-- floor -->
  <path d="M30 180 L168 180" stroke="#8A93A6" stroke-width="4"/>
  <g stroke="#2BD4F5" stroke-width="4">
    <!-- inverted figure, hands walking toward wall, feet up the wall -->
    <circle cx="64" cy="146" r="11"/>
    <!-- arms to floor -->
    <path d="M58 154 L48 180 M72 152 L78 180"/>
    <!-- torso angled up to wall -->
    <path d="M70 138 L130 86"/>
    <!-- legs onto wall -->
    <path d="M130 86 L168 64 M130 86 L162 78"/>
  </g>
  <!-- toward-wall arrow -->
  <path d="M60 40 L120 40 M108 32 L122 40 L108 48" stroke="#8A93A6" stroke-width="4"/>
</svg>
