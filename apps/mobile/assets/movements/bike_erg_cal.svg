<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- floor -->
  <path d="M20 176 L180 176" stroke="#8A93A6" stroke-width="4"/>
  <!-- bike erg: front flywheel + frame -->
  <g stroke="#8A93A6" stroke-width="4">
    <circle cx="48" cy="118" r="28"/>
    <line x1="48" y1="118" x2="48" y2="86"/>
    <line x1="48" y1="118" x2="48" y2="176"/>
    <!-- crank + pedal -->
    <circle cx="96" cy="138" r="10"/>
    <line x1="96" y1="138" x2="48" y2="118"/>
    <line x1="96" y1="138" x2="96" y2="176"/>
    <!-- seat post + handle -->
    <line x1="96" y1="138" x2="118" y2="78"/>
    <line x1="48" y1="86" x2="68" y2="72"/>
  </g>
  <g stroke="#2BD4F5" stroke-width="4">
    <!-- seated rider -->
    <circle cx="118" cy="66" r="11"/>
    <path d="M118 77 L120 108"/>
    <!-- arm to handle -->
    <path d="M118 86 L74 74"/>
    <!-- leg to pedal -->
    <path d="M120 108 L96 138"/>
  </g>
</svg>
