<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- floor -->
  <path d="M24 168 L176 168" stroke="#8A93A6" stroke-width="4"/>
  <!-- DOWN pose (ghost) lying flat, left -->
  <g stroke="#8A93A6" stroke-width="4" opacity="0.55">
    <circle cx="40" cy="150" r="9"/>
    <path d="M50 152 L96 150"/>
    <path d="M96 150 L120 130 L120 156"/>
  </g>
  <!-- UP pose: torso raised, knees bent, right -->
  <g stroke="#2BD4F5" stroke-width="4">
    <circle cx="120" cy="92" r="10"/>
    <path d="M118 102 L150 150"/>
    <!-- bent legs -->
    <path d="M150 150 L124 124 L98 150"/>
    <!-- arms reaching forward -->
    <path d="M120 110 L138 128"/>
  </g>
</svg>
