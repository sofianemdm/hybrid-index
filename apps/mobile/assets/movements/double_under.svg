<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- floor -->
  <path d="M24 176 L176 176" stroke="#8A93A6" stroke-width="4"/>
  <g stroke="#2BD4F5" stroke-width="4">
    <!-- figure jumping, small hop -->
    <circle cx="100" cy="58" r="11"/>
    <path d="M100 69 L100 116"/>
    <!-- arms low, hands at hips holding rope handles -->
    <path d="M100 80 L80 100 M100 80 L120 100"/>
    <!-- feet off ground -->
    <path d="M100 116 L90 150 M100 116 L110 150"/>
  </g>
  <!-- jump rope: full ellipse around figure (rope passing under twice) -->
  <ellipse cx="100" cy="118" rx="62" ry="58" stroke="#8A93A6" stroke-width="4"/>
  <ellipse cx="100" cy="118" rx="46" ry="50" stroke="#8A93A6" stroke-width="4" stroke-dasharray="3 10"/>
</svg>
