<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- floor -->
  <path d="M20 176 L180 176" stroke="#8A93A6" stroke-width="4"/>
  <!-- assault/air bike: big front fan wheel -->
  <g stroke="#8A93A6" stroke-width="4">
    <circle cx="52" cy="110" r="34"/>
    <!-- fan spokes -->
    <line x1="52" y1="80" x2="52" y2="140"/>
    <line x1="22" y1="110" x2="82" y2="110"/>
    <line x1="31" y1="89" x2="73" y2="131"/>
    <line x1="73" y1="89" x2="31" y2="131"/>
    <line x1="52" y1="144" x2="52" y2="176"/>
    <!-- moving arm handles -->
    <line x1="52" y1="76" x2="106" y2="56"/>
    <line x1="52" y1="76" x2="100" y2="120"/>
    <!-- crank + pedal -->
    <circle cx="100" cy="138" r="9"/>
    <line x1="100" y1="138" x2="100" y2="176"/>
    <!-- seat -->
    <line x1="100" y1="138" x2="122" y2="84"/>
  </g>
  <g stroke="#2BD4F5" stroke-width="4">
    <!-- rider gripping moving handle -->
    <circle cx="122" cy="72" r="11"/>
    <path d="M122 83 L124 112"/>
    <path d="M122 90 L104 60"/>
    <path d="M124 112 L100 138"/>
  </g>
</svg>
