<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- floor -->
  <path d="M24 184 L176 184" stroke="#8A93A6" stroke-width="4"/>
  <!-- hinge bottom (ghost): KB between legs -->
  <g stroke="#8A93A6" stroke-width="4" opacity="0.5">
    <circle cx="50" cy="84" r="9"/>
    <path d="M55 90 L80 116"/>
    <path d="M80 116 L80 184"/>
    <path d="M55 90 L70 124"/>
  </g>
  <!-- top: standing, arms extended forward at shoulder height -->
  <g stroke="#2BD4F5" stroke-width="4">
    <circle cx="120" cy="68" r="11"/>
    <path d="M120 79 L120 130"/>
    <!-- arms extended forward holding KB -->
    <path d="M120 88 L160 90"/>
    <path d="M120 130 L110 184 M120 130 L130 184"/>
  </g>
  <!-- kettlebell at top -->
  <g stroke="#2BD4F5" stroke-width="4">
    <path d="M162 86 a10 10 0 0 1 16 0"/>
    <circle cx="170" cy="102" r="12"/>
  </g>
  <!-- swing arc -->
  <path d="M88 150 Q120 110 170 96" stroke="#8A93A6" stroke-width="4" stroke-dasharray="2 10"/>
</svg>
