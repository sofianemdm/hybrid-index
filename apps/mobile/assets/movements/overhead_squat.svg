  </g>
  <!-- barbell overhead -->
  <g stroke="#8A93A6" stroke-width="4">
    <line x1="68" y1="40" x2="132" y2="40"/>
    <line x1="72" y1="32" x2="72" y2="48"/>
    <line x1="128" y1="32" x2="128" y2="48"/>
  </g>
</svg>
