<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- wall -->
  <path d="M150 24 L150 176" stroke="#8A93A6" stroke-width="4"/>
  <!-- floor -->
  <path d="M40 176 L150 176" stroke="#8A93A6" stroke-width="4"/>
  <g stroke="#2BD4F5" stroke-width="4">
    <!-- inverted figure: head down near floor (bottom of HSPU) -->
    <circle cx="92" cy="150" r="11"/>
    <!-- bent arms to floor -->
    <path d="M82 158 L74 176 M102 158 L110 176"/>
    <!-- torso up -->
    <path d="M92 139 L96 88"/>
    <!-- legs up toward wall -->
    <path d="M96 88 L90 50 M96 88 L108 54"/>
    <!-- feet resting on wall -->
    <path d="M90 50 L150 50 M108 54 L150 56"/>
  </g>
</svg>
