name: hybrid_index
description: HYBRID INDEX — app mobile (iOS + Android, base unique ; Web pour démo navigateur).
publish_to: "none"
version: 0.0.1+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  http: ^1.2.2
  flutter_riverpod: ^2.5.1
  fl_chart: ^0.69.0
  shared_preferences: ^2.3.2
  google_sign_in: ^6.2.1
  google_sign_in_web: ^0.12.4
  google_sign_in_platform_interface: ^2.5.0
  in_app_review: ^2.0.9
  share_plus: ^10.1.2
  image_picker: ^1.1.2
  # Notifications push (Android/iOS). Initialisé seulement quand PUSH_ENABLED=true ET hors web.
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  web_socket_channel: ^3.0.3
  cached_network_image: ^3.4.1
  firebase_crashlytics: ^4.3.10
  go_router: ^17.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/movements/
  fonts:
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-Light.ttf
          weight: 300
        - asset: assets/fonts/Rajdhani-Regular.ttf
          weight: 400
        - asset: assets/fonts/Rajdhani-Medium.ttf
          weight: 500
        - asset: assets/fonts/Rajdhani-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700
    # Inter en 6 poids STATIQUES (instanciés depuis la variable font via fonttools, P0.1 audit
    # design 03/07) : garantit des graisses réelles w400→w900 sur tous les moteurs (pas de gras
    # synthétisé/aplati). Ne pas revenir au seul fichier variable Inter.ttf.
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-400.ttf
          weight: 400
        - asset: assets/fonts/Inter-500.ttf
          weight: 500
        - asset: assets/fonts/Inter-600.ttf
          weight: 600
        - asset: assets/fonts/Inter-700.ttf
          weight: 700
        - asset: assets/fonts/Inter-800.ttf
          weight: 800
        - asset: assets/fonts/Inter-900.ttf
          weight: 900
