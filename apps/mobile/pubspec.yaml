name: hybrid_index
description: HYBRID INDEX — app mobile (iOS + Android, base unique ; Web pour démo navigateur).
publish_to: "none"
version: 0.0.1+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  http: ^1.2.2
  flutter_riverpod: ^2.5.1
  fl_chart: ^0.69.0
  shared_preferences: ^2.3.2
  google_sign_in: ^6.2.1
  google_sign_in_web: ^0.12.4
  google_sign_in_platform_interface: ^2.5.0
  in_app_review: ^2.0.9
  share_plus: ^10.1.2
  image_picker: ^1.1.2
  # Notifications push (Android/iOS). Initialisé seulement quand PUSH_ENABLED=true ET hors web.
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  web_socket_channel: ^3.0.3
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    # Schémas SVG du guide des mouvements (un fichier par movementId + _fallback.svg).
    - assets/movements/
  fonts:
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-Light.ttf
          weight: 300
        - asset: assets/fonts/Rajdhani-Regular.ttf
          weight: 400
        - asset: assets/fonts/Rajdhani-Medium.ttf
          weight: 500
        - asset: assets/fonts/Rajdhani-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700
    # Inter est une police VARIABLE (axe wght 100–900) : un seul fichier couvre tous les poids
    # utilisés par HiType (w500→w800). NE PAS remplacer par un static Regular (écraserait tout en 400).
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
