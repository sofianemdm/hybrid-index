name: hybrid_index
description: HYBRID INDEX — app mobile (iOS + Android, base unique ; Web pour démo navigateur).
publish_to: "none"
version: 0.0.1+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  http: ^1.2.2
  flutter_riverpod: ^2.5.1
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  google_sign_in: ^6.2.1
  google_sign_in_web: ^0.12.4
  google_sign_in_platform_interface: ^2.5.0
  in_app_review: ^2.0.9
  share_plus: ^10.1.2
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  fonts:
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-Light.ttf
          weight: 300
        - asset: assets/fonts/Rajdhani-Regular.ttf
          weight: 400
        - asset: assets/fonts/Rajdhani-Medium.ttf
          weight: 500
        - asset: assets/fonts/Rajdhani-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
